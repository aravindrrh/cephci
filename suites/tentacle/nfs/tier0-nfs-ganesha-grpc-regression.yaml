#===============================================================================================
#---  NFS Ganesha gRPC Regression Suite (CephFS) ---
#===============================================================================================
# Conf: conf/tentacle/nfs/1admin-7node-3client.yaml
#
# Phase-1 regression gates: cthon, pynfs, locks, POSIX, bootstrap, tier0/1 smoke, scale.
# Requires gRPC-enabled cephadm NFS image — set nfs_container_image in Jenkins or below.
#
# Modules: tests/nfs/grpc_admin/ + existing tests/nfs/*
#===============================================================================================
tests:
  - test:
      abort-on-fail: true
      desc: Install software pre-requisites for cluster deployment.
      module: install_prereq.py
      name: setup pre-requisites

  - test:
      abort-on-fail: true
      config:
        steps:
          - config:
              command: bootstrap
              service: cephadm
              args:
                mon-ip: node1
          - config:
              command: add_hosts
              service: host
              args:
                attach_ip_address: true
                labels: apply-all-labels
          - config:
              command: apply
              service: osd
              args:
                all-available-devices: true
          - config:
              args:
                - "ceph fs volume create cephfs"
              command: shell
          - config:
              args:
                placement:
                  label: mds
              base_cmd_args:
                verbose: true
              command: apply
              pos_args:
                - cephfs
              service: mds
      desc: Bootstrap and deploy Ceph services for gRPC regression testing.
      destroy-cluster: false
      module: test_cephadm.py
      name: Deploy cluster using cephadm

  - test:
      abort-on-fail: true
      config:
        command: add
        id: client.1
        node: node4
        install_packages:
          - ceph-common
          - ceph-fuse
        copy_admin_keyring: true
      desc: Configure client 1
      destroy-cluster: false
      module: test_client.py
      name: configure client 1

  - test:
      abort-on-fail: true
      config:
        command: add
        id: client.2
        node: node5
        install_packages:
          - ceph-common
          - ceph-fuse
        copy_admin_keyring: true
      desc: Configure client 2
      destroy-cluster: false
      module: test_client.py
      name: configure client 2

  - test:
      abort-on-fail: true
      config:
        command: add
        id: client.3
        node: node6
        install_packages:
          - ceph-common
          - ceph-fuse
        copy_admin_keyring: true
      desc: Configure client 3
      destroy-cluster: false
      module: test_client.py
      name: configure client 3

  - test:
      name: gRPC Regression - Set NFS Container Image
      module: grpc_admin.test_grpc_ganesha_deploy.py
      desc: Apply nfs_container_image override before NFS cluster create
      abort-on-fail: false
      config:
        operation: set_nfs_image
        # nfs_container_image: quay.io/rhceph/nfs-ganesha-grpc:<tag>

  - test:
      name: gRPC Regression - CephFS Bootstrap with gRPC
      module: grpc_admin.test_grpc_ganesha_deploy.py
      desc: Deploy cephadm NFS and verify gRPC port + service discovery
      polarion-id: CEPH-83632494
      abort-on-fail: false
      config:
        operation: verify_grpc_bootstrap
        nfs_name: cephfs-nfs
        nfs_export: /export
        nfs_mount: /mnt/nfs
        fs_name: cephfs
        clients: 1
        nfs_version: 4.1
        port: 2049

  - test:
      name: gRPC Regression - Cthon04
      module: test_cthon.py
      desc: Cthon04 test suite with gRPC-enabled NFS image
      polarion-id: CEPH-83632488
      abort-on-fail: false
      config:
        nfs_version: 4.1
        clients: 2
        total_num_exports: 4

  - test:
      name: gRPC Regression - Pynfs
      module: nfs_verify_pynfs.py
      desc: Pynfs test suite with gRPC-enabled NFS image
      polarion-id: CEPH-83632489
      abort-on-fail: false
      config:
        nfs_version: 4.1
        clients: 2

  - test:
      name: gRPC Regression - Lock Tests
      module: nfs_non_overlapping_locks.py
      desc: Non-overlapping byte-range lock tests with gRPC-enabled NFS
      polarion-id: CEPH-83632490
      abort-on-fail: false
      config:
        nfs_version: 4.1
        clients: 3

  - test:
      name: gRPC Regression - POSIX pjdfstest
      module: grpc_admin.test_grpc_pjdfstest.py
      desc: pjdfstest POSIX smoke on NFS mount with gRPC-enabled Ganesha
      polarion-id: CEPH-83632491
      abort-on-fail: false
      config:
        nfs_name: cephfs-nfs
        nfs_export: /export
        nfs_mount: /mnt/nfs
        fs_name: cephfs
        nfs_version: 4.1
        port: 2049

  - test:
      name: gRPC Regression - Tier0 Gate Smoke
      module: grpc_admin.test_grpc_ganesha_regression_gate.py
      desc: Representative tier0 NFS checks with gRPC-enabled image
      polarion-id: CEPH-83632496
      abort-on-fail: false
      config:
        operation: tier0_smoke
        nfs_version: 4.1
        clients: 2

  - test:
      name: gRPC Regression - Tier1 Gate Smoke
      module: grpc_admin.test_grpc_ganesha_regression_gate.py
      desc: Representative tier1 NFS checks with gRPC-enabled image
      polarion-id: CEPH-83632497
      abort-on-fail: false
      config:
        operation: tier1_smoke
        nfs_version: 4.1
        clients: 1

  - test:
      name: gRPC Regression - Ceph NFS Scale
      module: nfs_verify_scale.py
      desc: Ceph NFS scale test with gRPC-enabled cephadm NFS image
      polarion-id: CEPH-83632499
      abort-on-fail: false
      config:
        execution_type: parallel
        num_of_servers: 1
        num_of_exports: 3
        num_of_clients: 3
        exports_per_client: 1
        nfs_version: 4.1
        benchmark: SWBUILD
        load: 1
        incr_load: 1
        num_runs: 1
        clients:
          - client1
          - client2
          - client3
        benchmark_defination:
          Warmup_time: 30
          Dir_count: 10
          Files_per_dir: 20
          File_size: 3k
          Instances: 3
