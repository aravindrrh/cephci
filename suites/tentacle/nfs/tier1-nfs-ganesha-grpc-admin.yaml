        operation: compare_admin_parity
        blocked: true
        skip_if_blocked: true
        nfs_name: cephfs-nfs
        nfs_export: /export
        clients: 1

  - test:
      name: gRPC Admin - Log Management API Parity
      module: grpc_admin.test_grpc_ganesha_parity.py
      desc: LogService D-Bus vs gRPC parity — skipped until proto
      polarion-id: CEPH-83632478
      abort-on-fail: false
      config:
        operation: compare_log_parity
        blocked: true
        skip_if_blocked: true
        nfs_name: cephfs-nfs
        nfs_export: /export
        clients: 1

  - test:
      name: gRPC Admin - Stats API Parity
      module: grpc_admin.test_grpc_ganesha_parity.py
      desc: StatsService D-Bus vs gRPC parity — skipped until proto
      polarion-id: CEPH-83632479
      abort-on-fail: false
      config:
        operation: compare_stats_parity
        blocked: true
        skip_if_blocked: true
        nfs_name: cephfs-nfs
        nfs_export: /export
        clients: 1

  - test:
      name: gRPC Admin - Invalid RPC Request Handling
      module: grpc_admin.test_grpc_ganesha_security_negative.py
      desc: Malformed JSON / protobuf rejected by gRPC server
      polarion-id: CEPH-83632501
      abort-on-fail: false
      config:
        operation: verify_invalid_protobuf
        nfs_name: cephfs-nfs
        nfs_export: /export
        nfs_mount: /mnt/nfs
        clients: 1
        nfs_version: 4.1
        port: 2049

  - test:
      name: gRPC Admin - Resource Exhaustion Handling
      module: grpc_admin.test_grpc_ganesha_load_negative.py
      desc: Concurrent grpcurl load — daemon stays responsive
      polarion-id: CEPH-83632502
      abort-on-fail: false
      config:
        operation: verify_resource_exhaustion
        nfs_name: cephfs-nfs
        nfs_export: /export
        nfs_mount: /mnt/nfs
        clients: 1
        nfs_version: 4.1
        port: 2049
        iterations: 50
        workers: 5

  - test:
      name: gRPC Admin - Timeout Handling
      module: grpc_admin.test_grpc_ganesha_security_negative.py
      desc: Short client timeout on gRPC RPC
      polarion-id: CEPH-83632503
      abort-on-fail: false
      config:
        operation: verify_timeout
        nfs_name: cephfs-nfs
        nfs_export: /export
        nfs_mount: /mnt/nfs
        clients: 1
        nfs_version: 4.1
        port: 2049
        max_time_sec: 0.001

