#===============================================================================================
#-------------------------------------
#---    Test Suite for Nfs Ganesha vers 4.2---
#-------------------------------------
# Conf: conf/spectrum_scale/spectrum_scale_2node.yaml (installer + 2 clients)
# 2-node conf: ml_console on installer; c1/c2 on the two clients.
#
#===============================================================================================
tests:
  - test:
      name: Nfs run multilock split_lock
      module: upstream_nfs_multilock.py
      desc: Verify multilock split_lock on nfs ganesha with Scale FSAL
      abort-on-fail: false
      config:
        nfs_versions: ["4.1", "3"]
        spectrum_scale: true
        clients: 2
        mount_point: /mnt/multilock_test
        multilock_port: "8000"
        nfs_export: /ibm/scale_volume
        multilock_iterations: 5
        cleanup: true