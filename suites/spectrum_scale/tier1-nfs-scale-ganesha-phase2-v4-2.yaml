#===============================================================================================
# Tier1 phase2 NFS-Ganesha on Spectrum Scale (GPFS), NFS 4.2 — IO / copy / rename
#----------------------------------------------------------------------------------------------
# Omits ceph mgr / stress / truncate / client-permission / v3+v4 multi-mount tests.
#===============================================================================================
tests:
  - test:
      name: Setup NFS Ganesha Spectrum Scale stack
      module: nfs_run_spectrum_scale_upstream.py
      desc: Bootstrap GPFS-backed Ganesha via ci-tests
      abort-on-fail: true

  - test:
      name: Verify create file, create hardlink and lookups
      module: spectrumscale.scale_nfs_verify_file_ops_hard_links.py
      polarion-id: CEPH-83577597
      abort-on-fail: false
      config:
        nfs_backend: spectrum_scale
        skip_spectrum_scale_stack_setup: true
        nfs_version: 4.2
        clients: 3
        file_count: 100

  - test:
      name: Modifying file attributes (size, mtime, atime)
      module: spectrumscale.scale_nfs_verify_file_modification.py
      polarion-id: CEPH-83577602
      abort-on-fail: false
      config:
        nfs_backend: spectrum_scale
        skip_spectrum_scale_stack_setup: true
        nfs_version: 4.2
        clients: 3
        file_count: 100

  - test:
      name: Nfs Verify multiple parallel io and lookups
      module: spectrumscale.scale_nfs_verify_multiple_parallel_io_and_lookups.py
      polarion-id: CEPH-83581304
      abort-on-fail: false
      config:
        nfs_backend: spectrum_scale
        skip_spectrum_scale_stack_setup: true
        nfs_version: 4.2
        clients: 4

  - test:
      name: Nfs Verify rm write lookups in parallel from multi clients
      module: spectrumscale.scale_nfs_verify_parallel_rm_write_lookup.py
      polarion-id: CEPH-83577591
      abort-on-fail: false
      config:
        nfs_backend: spectrum_scale
        skip_spectrum_scale_stack_setup: true
        nfs_version: 4.2
        clients: 4

  - test:
      name: Nfs Test File Append
      module: spectrumscale.scale_nfs_file_append.py
      polarion-id: CEPH-83577599
      abort-on-fail: false
      config:
        nfs_backend: spectrum_scale
        skip_spectrum_scale_stack_setup: true
        nfs_version: 4.2
        clients: 4

  - test:
      name: Nfs Verify read write operation permissions
      module: spectrumscale.scale_nfs_verify_read_write_operations.py
      polarion-id: CEPH-83575941
      abort-on-fail: false
      config:
        nfs_backend: spectrum_scale
        skip_spectrum_scale_stack_setup: true
        nfs_version: 4.2
        clients: 3
        operation: verify_permission

  - test:
      name: Nfs verify read and write non existing file
      module: spectrumscale.scale_nfs_verify_read_write_operations.py
      polarion-id: CEPH-83575927
      abort-on-fail: false
      config:
        nfs_backend: spectrum_scale
        skip_spectrum_scale_stack_setup: true
        nfs_version: 4.2
        clients: 3
        operation: verify_non_existing_file

  - test:
      name: Nfs Ganesha copy operations
      module: spectrumscale.scale_test_file_ops_copy.py
      polarion-id: CEPH-83577595
      abort-on-fail: false
      config:
        nfs_backend: spectrum_scale
        skip_spectrum_scale_stack_setup: true
        nfs_version: 4.2
        clients: 3
        num_files: 1000
        num_dirs: 1000

  - test:
      name: Nfs Ganesha rename operations
      module: spectrumscale.scale_test_file_ops_renames.py
      polarion-id: CEPH-83577594
      abort-on-fail: false
      config:
        nfs_backend: spectrum_scale
        skip_spectrum_scale_stack_setup: true
        nfs_version: 4.2
        clients: 3
        num_files: 1000
        num_dirs: 1000
